<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JozArt | Portafolio</title>
    <style>
        /* ==========================================
           1. ESTILOS BASE Y CONFIGURACIÓN (CSS)
           ========================================== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 100vw;
            height: 100vh;
            background-color: #000000;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #ffffff;
            touch-action: none; 
        }

        /* Ventana de recorte fija que contiene la experiencia */
        #viewport {
            position: relative;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        /* Riel horizontal interactivo controlado por JS */
        #camera-track {
            display: flex;
            flex-direction: row;
            width: max-content; 
            height: 100%;
            will-change: transform;
        }

        /* Cada contenedor de escena ocupa toda la pantalla */
        .scene {
            position: relative;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Capas de imágenes adaptables */
        .layer {
            position: absolute;
            width: 115%; /* Un poco más de margen para el balanceo automático */
            height: 115%;
            object-fit: cover;
            pointer-events: none; 
            will-change: transform;
        }

        /* Viñeta de oscurecimiento cinematográfico */
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, rgba(0,0,0,0.1) 0%, rgba(0,0,0,0.7) 100%);
            pointer-events: none;
            z-index: 10;
        }

        /* Interfaz estática superior */
        .ui-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 20;
            pointer-events: none;
            text-align: center;
            padding: 20px;
        }

        .brand-title {
            font-size: clamp(2.5rem, 8vw, 6rem);
            font-weight: 900;
            letter-spacing: 0.5rem;
            text-shadow: 0px 4px 20px rgba(0, 0, 0, 0.8);
            margin-bottom: 0.5rem;
        }

        .brand-subtitle {
            font-size: clamp(0.8rem, 2vw, 1.3rem);
            font-weight: 300;
            letter-spacing: 0.15rem;
            text-transform: uppercase;
            color: #cccccc;
            text-shadow: 0px 2px 10px rgba(0, 0, 0, 0.9);
            margin-bottom: 3rem;
        }

        /* Botón interactivo */
        .btn-enter {
            pointer-events: auto; 
            display: inline-block;
            padding: 1rem 2.5rem;
            font-size: 1rem;
            font-weight: 600;
            letter-spacing: 0.1rem;
            text-decoration: none;
            color: #ffffff;
            background: transparent;
            border: 2px solid #ffffff;
            border-radius: 4px;
            transition: background-color 0.3s ease, transform 0.2s ease, box-shadow 0.3s ease;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent; 
        }

        .btn-enter:hover {
            background-color: #ffffff;
            color: #000000;
            box-shadow: 0 0 25px rgba(255, 255, 255, 0.4);
            transform: scale(1.05);
        }
    </style>
</head>
<body>

    <!-- Contenedor principal de la cámara -->
    <main id="viewport">
        <div id="camera-track">
            
            <!-- Escena Izquierda (r3) -->
            <section class="scene" data-scene="r3">
                <img src="r3 capa 0" alt="Fondo Escena Izquierda" class="layer layer-bg">
                <img src="r3 capa 1.png" alt="Frente Escena Izquierda" class="layer layer-fg">
            </section>

            <!-- Escena Principal Centro (r1) -->
            <section class="scene" data-scene="r1">
                <img src="r1 capa 0.png" alt="Fondo Escena Principal" class="layer layer-bg">
                <img src="r1 capa 1.png" alt="Frente Escena Principal" class="layer layer-fg">
            </section>

            <!-- Escena Derecha (r2) -->
            <section class="scene" data-scene="r2">
                <img src="r2 capa 0.png" alt="Fondo Escena Derecha" class="layer layer-bg">
                <img src="r2 capa 1.png" alt="Frente Escena Derecha" class="layer layer-fg">
            </section>

        </div>
    </main>

    <!-- Overlay oscuro global -->
    <div class="overlay"></div>

    <!-- Interfaz de Usuario fija (UI) -->
    <header class="ui-container">
        <h1 class="brand-title">JOZART</h1>
        <p class="brand-subtitle">Modelador 3D • Blender • Minecraft</p>
        <a href="portfolio.html" class="btn-enter">Entrar al Portafolio</a>
    </header>

    <!-- ==========================================
       2. LÓGICA DE CONTROL INTELIGENTE (JS)
       ========================================== -->
    <script>
        // --- PARÁMETROS CONFIGURABLES ---
        const PARALLAX_BG_INTENSITY = 25;  
        const PARALLAX_FG_INTENSITY = -35; 
        const LERP_FACTOR = 0.08;          

        // Configuración PC
        const EDGE_THRESHOLD = 0.08;       
        const HOLD_TIME_REQUIRED = 400;    
        const DEBOUNCE_COOLDOWN = 1200;    

        // Configuración exclusiva Móvil
        const MOBILE_AUTO_SWAP_TIME = 4000; // Cambio de escena automático cada 4 segundos (4000ms)
        const MOBILE_PARALLAX_SPEED = 0.0015; // Velocidad del balanceo automático (menor = más lento)

        const SCENE_ORDER = ['r3', 'r1', 'r2']; 
        let currentSceneIndex = 1; 

        // Estados del sistema
        const mouse = { x: 0, y: 0 };
        const targetMouse = { x: 0, y: 0 };
        const camera = { targetX: 0, currentX: 0 };

        let edgeTimer = null;
        let isCooldown = false;
        let currentDirection = null;
        let isMobile = false;
        let autoPlayDirection = 1; // 1 va a la derecha, -1 va a la izquierda

        const cameraTrack = document.getElementById('camera-track');
        const scenes = document.querySelectorAll('.scene');

        // --- DETECTOR DE DISPOSITIVOS ---
        function detectDevice() {
            // Verifica si el dispositivo soporta touch nativo o es una pantalla pequeña
            isMobile = ('ontouchstart' in window) || (navigator.maxTouchPoints > 0) || (window.innerWidth <= 768);
            
            if (isMobile) {
                initMobileAutoPlay();
            } else {
                initPCControls();
            }
        }

        function initCamera() {
            camera.targetX = -currentSceneIndex * window.innerWidth;
            camera.currentX = camera.targetX;
            cameraTrack.style.transform = `translate3d(${camera.currentX}px, 0px, 0px)`;
        }

        window.addEventListener('resize', () => {
            camera.targetX = -currentSceneIndex * window.innerWidth;
        });

        // --- CONFIGURACIÓN PARA PC ---
        function initPCControls() {
            window.addEventListener('mousemove', (e) => {
                const width = window.innerWidth;
                const height = window.innerHeight;

                targetMouse.x = (e.clientX / width) * 2 - 1;
                targetMouse.y = (e.clientY / height) * 2 - 1;

                checkScreenEdges(e.clientX, width);
            });
        }

        function checkScreenEdges(mouseX, screenWidth) {
            if (isCooldown) return;

            const leftZone = screenWidth * EDGE_THRESHOLD;
            const rightZone = screenWidth * (1 - EDGE_THRESHOLD);

            if (mouseX <= leftZone) {
                startEdgeTimer('left');
            } else if (mouseX >= rightZone) {
                startEdgeTimer('right');
            } else {
                clearEdgeTimer();
            }
        }

        function startEdgeTimer(direction) {
            if (currentDirection === direction) return;
            clearEdgeTimer();
            currentDirection = direction;

            edgeTimer = setTimeout(() => {
                navigateScene(direction);
            }, HOLD_TIME_REQUIRED);
        }

        function clearEdgeTimer() {
            if (edgeTimer) {
                clearTimeout(edgeTimer);
                edgeTimer = null;
            }
            currentDirection = null;
        }

        // --- CONFIGURACIÓN AUTOMÁTICA PARA MÓVILES ---
        function initMobileAutoPlay() {
            setInterval(() => {
                // Lógica de vaivén: r1 -> r2 -> r1 -> r3 -> r1...
                let nextIndex = currentSceneIndex + autoPlayDirection;

                // Si llega al final de la derecha (r2), cambia de dirección hacia la izquierda
                if (nextIndex >= SCENE_ORDER.length) {
                    autoPlayDirection = -1;
                    nextIndex = currentSceneIndex + autoPlayDirection;
                } 
                // Si llega al final de la izquierda (r3), cambia de dirección hacia la derecha
                else if (nextIndex < 0) {
                    autoPlayDirection = 1;
                    nextIndex = currentSceneIndex + autoPlayDirection;
                }

                currentSceneIndex = nextIndex;
            }, MOBILE_AUTO_SWAP_TIME);
        }

        // --- MOTOR DE NAVEGACIÓN GENERAL ---
        function navigateScene(direction) {
            let targetIndex = currentSceneIndex;

            if (direction === 'left' && currentSceneIndex > 0) {
                targetIndex--;
            } else if (direction === 'right' && currentSceneIndex < SCENE_ORDER.length - 1) {
                targetIndex++;
            }

            if (targetIndex !== currentSceneIndex) {
                currentSceneIndex = targetIndex;
                isCooldown = true;
                clearEdgeTimer();

                setTimeout(() => {
                    isCooldown = false;
                }, DEBOUNCE_COOLDOWN);
            }
        }

        // --- LOOP DE ANIMACIÓN ---
        function animate(timestamp) {
            if (isMobile) {
                // En móvil usamos funciones Seno y Coseno con el tiempo actual (timestamp)
                // para crear curvas de movimiento orgánicas, fluidas e impredecibles.
                targetMouse.x = Math.sin(timestamp * MOBILE_PARALLAX_SPEED) * 0.7;
                targetMouse.y = Math.cos(timestamp * MOBILE_PARALLAX_SPEED * 1.3) * 0.5;
            }

            // Interpolación matemática (Lerp) para mantener la suavidad a 60 FPS
            mouse.x += (targetMouse.x - mouse.x) * LERP_FACTOR;
            mouse.y += (targetMouse.y - mouse.y) * LERP_FACTOR;

            camera.targetX = -currentSceneIndex * window.innerWidth;
            camera.currentX += (camera.targetX - camera.currentX) * LERP_FACTOR;
            
            cameraTrack.style.transform = `translate3d(${camera.currentX}px, 0px, 0px)`;

            scenes.forEach((scene) => {
                const bgLayer = scene.querySelector('.layer-bg');
                const fgLayer = scene.querySelector('.layer-fg');

                if (bgLayer && fgLayer) {
                    const bgX = mouse.x * PARALLAX_BG_INTENSITY;
                    const bgY = mouse.y * PARALLAX_BG_INTENSITY;
                    bgLayer.style.transform = `translate3d(${bgX}px, ${bgY}px, 0px)`;

                    const fgX = mouse.x * PARALLAX_FG_INTENSITY;
                    const fgY = mouse.y * PARALLAX_FG_INTENSITY;
                    fgLayer.style.transform = `translate3d(${fgX}px, ${fgY}px, 0px)`;
                }
            });

            requestAnimationFrame(animate);
        }

        // --- ARRANQUE DEL MOTOR ---
        detectDevice();
        initCamera();
        requestAnimationFrame(animate);
    </script>
</body>
</html>
