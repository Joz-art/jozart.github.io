<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>JozArt</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="favicon.png" type="image/png">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f0f14;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      text-align: center;
    }

    .portada img {
      width: 280px;
      border-radius: 20px;
      margin: 20px 0;
    }

    .dots {
      font-size: 32px;
      cursor: pointer;
      animation: bounce 1.5s infinite;
    }

    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(8px); }
    }

    a {
      color: white;
      text-decoration: none;
    }
    .perfil-box{
  display:flex;
  flex-direction:column;
  gap:10px;
  margin-top:20px;
}

.perfil-box input{
  padding:10px;
  border-radius:10px;
  border:none;
}

.perfil-box button{
  padding:10px;
  border:none;
  border-radius:10px;
  background:#6c63ff;
  color:white;
  cursor:pointer;
}
  </style>
</head>

<body>

  <div class="portada">
    <h1>✨ JozArt ✨</h1>
    <p>Portafolio 3D · Blender · Minecraft</p>

    <!-- IMAGEN DE PORTADA -->
    <img src="preview.png" alt="Portada">
  <!-- USUARIO -->
  <div class="perfil-box">
  <input type="text" id="username" placeholder="Tu nombre">
  <input type="file" id="useravatar" accept="image/*">
  <button onclick="saveProfile()">Guardar perfil</button>
</div>
    <!-- 3 PUNTITOS -->
    <a href="portfolio.html">
    <h2> 👇Unde Aqui👇</h2>
    <div class="dots">•••</div>
    </a>
  </div>
  <script>
function saveProfile(){
  const name = document.getElementById("username").value;
  const avatarInput = document.getElementById("useravatar");

  if(!name){
    alert("Pon tu nombre bro 😠");
    return;
  }

  const reader = new FileReader();

  reader.onload = function(){
    localStorage.setItem("profileName", name);
    localStorage.setItem("profileAvatar", reader.result || "");
    alert("Perfil guardado 😎");
  };

  if(avatarInput.files[0]){
    reader.readAsDataURL(avatarInput.files[0]);
  } else{
    reader.onload();
  }
}
</script>

</body>
</html>
